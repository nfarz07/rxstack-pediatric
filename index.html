
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RxStack Pediatric Calculator</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1976d2">
<link rel="apple-touch-icon" href="icon-192.png.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:#f4f7fb;
padding:20px;
}

.container{
max-width:650px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#1565c0;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-weight:600;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:10px;
background:#1565c0;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

.result{
margin-top:20px;
padding:15px;
background:#eef6ff;
border-radius:12px;
display:none;
}

.warning{
margin-top:20px;
padding:12px;
background:#fff3cd;
border-radius:10px;
font-size:14px;
}

footer{
margin-top:25px;
text-align:center;
font-size:14px;
color:#555;
}
</style>
</head>

<body>

<div class="container">

<h1>RxStack Pediatric Calculator</h1>

<label>Weight (kg)</label>
<input type="number" id="weight" placeholder="Enter weight">

<label>Route</label>
<select id="route" onchange="loadDrugs()">
<option value="PO">PO (Oral)</option>
<option value="IV">IV</option>
<option value="IM">IM</option>
</select>

<label>Drug</label>
<select id="drug"></select>

<label>Strength</label>
<select id="strength"></select>

<button onclick="calculateDose()">
Calculate Dose
</button>

<div id="result" class="result"></div>

<div class="warning">
⚠ Educational tool only. Verify dose according to local guideline before prescribing.
</div>

<footer>
Developed by Dr. Mizan<br>
rxstack.dev
</footer>

</div>

<script>

const drugs = {

PO: [

{
name:"Amoxicillin",
dose:25,
frequency:"BD",
strengths:[
{label:"125 mg/5 mL", mgml:25},
{label:"250 mg/5 mL", mgml:50},
{label:"400 mg/5 mL", mgml:80}
]
},

{
name:"Cefixime",
dose:4,
frequency:"BD",
strengths:[
{label:"50 mg/5 mL", mgml:10},
{label:"100 mg/5 mL", mgml:20}
]
},

{
name:"Azithromycin",
dose:10,
frequency:"OD",
strengths:[
{label:"200 mg/5 mL", mgml:40}
]
}

],

IV:[

{
name:"Ceftriaxone",
dose:50,
frequency:"OD",
strengths:[
{label:"1 g in 10 mL", mgml:100}
]
},

{
name:"Ampicillin",
dose:50,
frequency:"QID",
strengths:[
{label:"500 mg in 5 mL", mgml:100}
]
}

],

IM:[

{
name:"Gentamicin",
dose:7.5,
frequency:"OD",
strengths:[
{label:"40 mg/mL", mgml:40}
]
}

]

};

function loadDrugs(){

const route=document.getElementById("route").value;
const drugSelect=document.getElementById("drug");

drugSelect.innerHTML="";

drugs[route].forEach((drug,index)=>{

let option=document.createElement("option");

option.value=index;
option.textContent=drug.name;

drugSelect.appendChild(option);

});

loadStrengths();

}

function loadStrengths(){

const route=document.getElementById("route").value;

const drugIndex=document.getElementById("drug").value;

const strengthSelect=document.getElementById("strength");

strengthSelect.innerHTML="";

drugs[route][drugIndex].strengths.forEach((s,index)=>{

let option=document.createElement("option");

option.value=index;

option.textContent=s.label;

strengthSelect.appendChild(option);

});

}

function calculateDose(){

const weight=parseFloat(
document.getElementById("weight").value
);

if(!weight){
alert("Enter weight");
return;
}

const route=
document.getElementById("route").value;

const drugIndex=
document.getElementById("drug").value;

const strengthIndex=
document.getElementById("strength").value;

const drug=
drugs[route][drugIndex];

const strength=
drug.strengths[strengthIndex];

const totalMg=
weight * drug.dose;

const totalMl=
totalMg / strength.mgml;

const result=
`
<h3>${drug.name}</h3>

<p><b>Route:</b> ${route}</p>

<p><b>Weight:</b> ${weight} kg</p>

<p><b>Dose:</b> ${drug.dose} mg/kg/dose</p>

<p><b>Strength:</b> ${strength.label}</p>

<p><b>Required:</b> ${totalMg.toFixed(1)} mg</p>

<p><b>Give:</b> ${totalMl.toFixed(1)} mL</p>

<p><b>Frequency:</b> ${drug.frequency}</p>
`;

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=result;

}

document.getElementById("drug")
.addEventListener("change",loadStrengths);

loadDrugs();

if ("serviceWorker" in navigator) {
window.addEventListener("load", () => {
navigator.serviceWorker.register("./sw.js");
});
}

</script>

</body>
</html>
