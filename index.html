<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RxStack™ Pediatric Dose Calculator</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1976d2">

<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>

<h1>🩺 RxStack</h1>

<p class="subtitle">
Pediatric Dose Calculator
</p>

<button id="darkModeBtn">
🌙 Dark Mode
</button>

</header>

<label>Age (Years)</label>
<input
type="number"
id="age"
placeholder="Enter age">

<label>Weight (kg)</label>
<input
type="number"
id="weight"
placeholder="Enter weight">

<label>Category</label>
<select id="category">

<option value="all">All Drugs</option>

<option value="analgesic">
Analgesics
</option>

<option value="antibiotic">
Antibiotics
</option>

<option value="respiratory">
Respiratory
</option>

<option value="antihistamine">
Antihistamines
</option>

<option value="gi">
GI Drugs
</option>

</select>

<label>Route</label>

<select
id="route"
onchange="loadDrugs()">

<option value="PO">
PO (Oral)
</option>

<option value="IV">
IV
</option>

<option value="IM">
IM
</option>

</select>

<label>Search Drug</label>

<input
type="text"
id="drugSearch"
placeholder="Search drug...">

<label>Drug</label>

<select id="drug">
</select>

<label>Strength</label>

<select id="strength">
</select>

<button
class="calculate-btn"
onclick="calculateDose()">

Calculate Dose

</button>

<div
id="result"
class="result">
</div>

<div class="warning">

⚠ Educational tool only.
Always verify indication,
age suitability,
renal function,
allergy history,
and maximum dose before prescribing.

</div>

</div>

</body>
</html>
